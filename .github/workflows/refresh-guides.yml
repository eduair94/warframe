name: Guides / 90-day auto-refresh

# Every ~90 days, refresh the Knowledge Center guides with Gemini (grounded with
# Google Search), re-verify every embedded video via YouTube oEmbed, run the i18n
# gate, and — only if everything passes — commit straight to main. A push to main
# is what deploy.yml watches, so a clean refresh auto-deploys to prod.
#
# SAFETY: the commit is gated. The refresh script exits non-zero on any malformed
# guide or dead video it cannot drop cleanly, and i18n:check must compile. A bad
# model run therefore fails the job and leaves main (and prod) untouched — there
# is no human in the loop on the happy path, but no unverified content ships.
#
# ARMING (dormant until you switch it on, mirroring DEPLOY_ENABLED):
#   1. Add repo secret   GEMINI_API_KEY        (Google AI Studio key).
#   2. (recommended) add secret GUIDE_REFRESH_PAT — a fine-grained PAT with
#      contents:write. Pushing with the default GITHUB_TOKEN does NOT trigger
#      deploy.yml, so without a PAT the refresh commit lands but won't auto-deploy
#      until the next push. With the PAT, the commit triggers CI + deploy normally.
#   3. Set repo variable GUIDE_REFRESH_ENABLED=true.
# Until (3) is true the scheduled run no-ops; you can still test via "Run workflow".

on:
  schedule:
    # 06:00 UTC on the 1st of Jan/Apr/Jul/Oct — quarterly, ~90 days apart.
    - cron: '0 6 1 */3 *'
  workflow_dispatch:
    inputs:
      slugs:
        description: 'Comma-separated guide slugs to refresh (blank = all)'
        required: false
        default: ''

concurrency:
  group: guides-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh guides (Gemini + oEmbed gate)
    runs-on: ubuntu-latest
    # Scheduled runs stay dormant until armed; manual dispatch always allowed for testing.
    if: github.event_name == 'workflow_dispatch' || vars.GUIDE_REFRESH_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PAT (if present) so the resulting push triggers deploy.yml.
          token: ${{ secrets.GUIDE_REFRESH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install app deps (for the i18n gate)
        run: npm ci
        working-directory: app

      - name: Install Gemini SDK (not a project dependency)
        run: npm install --no-save @google/genai

      - name: Refresh guides
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GUIDE_REFRESH_MODEL || 'gemini-pro-latest' }}
          GUIDE_SLUGS: ${{ github.event.inputs.slugs }}
        run: node scripts/refresh-guides.mjs

      # BLOCKING gate — vue-i18n must still compile every message after the edit.
      - name: i18n messages compile (app)
        run: npm run i18n:check
        working-directory: app

      # Advisory — surfaces type drift without blocking (matches deploy.yml policy).
      - name: Typecheck (app) [advisory]
        run: npm run typecheck
        working-directory: app
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          set -e
          if git diff --quiet -- app/app/data/guides; then
            echo "No guide changes to commit."
            exit 0
          fi
          git config user.name  "warframe-guides-bot"
          git config user.email "actions@users.noreply.github.com"
          git add app/app/data/guides
          git commit -m "chore(guides): 90-day auto-refresh (Gemini + Google Search)

          Fact-checked against current patch notes; every video id re-verified via
          YouTube oEmbed. Generated by scripts/refresh-guides.mjs.

          Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>"
          git push
