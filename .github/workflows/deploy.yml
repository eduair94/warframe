name: CI / Deploy

# Push to main  -> run gates, then deploy to the pm2 prod server over SSH.
# Pull requests -> run gates only (no deploy).
# See docs/superpowers/specs/2026-07-15-cicd-github-actions-design.md
on:
  push:
    branches: [main]
  pull_request:

# Serialize per ref: main runs QUEUE (never two deploys at once); superseded PR
# check runs cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Gates (lint / typecheck / unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install API deps
        run: npm ci

      - name: Install app deps
        run: npm ci
        working-directory: app

      # --- Gates ---
      # Style/static-analysis gates are ADVISORY (continue-on-error): they run
      # and annotate the run, but do not block deploy while pre-existing lint /
      # format / type debt is cleaned up incrementally. Unit tests are the one
      # BLOCKING gate — a failure here fails the job and stops the deploy.
      - name: Lint (API) [advisory]
        run: npm run lint
        continue-on-error: true

      - name: Format check (API) [advisory]
        run: npm run format:check
        continue-on-error: true

      - name: Typecheck (app) [advisory]
        run: npm run typecheck
        working-directory: app
        continue-on-error: true

      - name: Lint (app) [advisory]
        run: npm run lint
        working-directory: app
        continue-on-error: true

      # BLOCKING — must pass for the deploy to run.
      - name: Unit tests (API)
        run: npm run test:unit

      # BLOCKING — vue-i18n must compile every message. A literal @ (linked-msg
      # marker), unescaped {, or {{double-brace}} crashes the page in the prod
      # build (this exact class blanked /endo). Escape specials: @ -> {'@'}.
      - name: i18n messages compile (app)
        run: npm run i18n:check
        working-directory: app

  deploy:
    name: Deploy to prod (pm2)
    needs: ci
    # Dormant until you ARM it: set repo variable DEPLOY_ENABLED=true (after the
    # SSH secrets are in place). Lets the workflow land + run CI without firing a
    # deploy that would fail for missing secrets.
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (pull -> build -> pm2 reload)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # Abort on the first failing command, so a failed build never reaches
          # `pm2 reload` and prod keeps serving the previous build.
          script_stop: true
          script: |
            set -e
            # The server's root user defaults to node 22 via nvm; the Nuxt build
            # (and the npm-11 lockfile) need node 24 / npm 11, which live in
            # /usr/local/bin. Prepend it so node/npm/pm2 all resolve to 24.
            export PATH=/usr/local/bin:$PATH
            # The app (Nuxt) build now bundles the localized SEO overlay plus a
            # few hundred per-locale guide/faq/creators content JSON chunks. That
            # pushed the build past node's default heap (auto-sized to the box,
            # ~2 GB) → "JavaScript heap out of memory" mid-build. Give the build
            # headroom so `npm run build` (app) completes before pm2 reload.
            export NODE_OPTIONS="--max-old-space-size=4096"
            node -v
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull --ff-only
            npm ci
            npm run build
            cd app
            npm ci
            npm run build
            cd ..
            pm2 reload ecosystem.config.js --update-env
            # `pm2 reload` only touches already-running apps, so a NEWLY added
            # ecosystem entry (e.g. warframe-sync-translations) is never picked
            # up. Explicitly start/re-run just that one-shot sync so the i18n
            # dictionaries are registered and populated on deploy (it's light and
            # autorestart:false, so it runs once and exits; the daily cron takes
            # over after). --only keeps this from re-triggering the heavy syncs
            # (items/rivens/drops) that `reload` intentionally leaves stopped.
            pm2 start ecosystem.config.js --only warframe-sync-translations --update-env || true
            pm2 save || true
